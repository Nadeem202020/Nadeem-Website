name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./client
        run: npm install --include=optional

      - name: Install Rolldown native binding
        working-directory: ./client
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.18

      - name: Install Lightning CSS native binding
        working-directory: ./client
        run: npm install --no-save lightningcss-linux-x64-gnu@1.32.0

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
